server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # Assets com hash → cache longo e imutável
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Demais estáticos
    location ~* \.(?:ico|png|jpg|jpeg|gif|webp|svg|woff2?|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Healthcheck (Coolify)
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Páginas: tenta arquivo prerenderizado (ex.: /clientes/index.html),
    # depois cai no SPA shell (index.html) — TanStack Router resolve no cliente.
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
